server:
  port: 8080
  servlet:
    context-path: /surveyuni

spring:
  datasource:
    url: "jdbc:mysql://localhost:3306/surveyuni?userSSL=false&serverTimezone=UTC"
    username: root
    password: "1"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update # hibernate tự động cập nhật db theo entity
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format-sql: true
  application:
    name: survey-uni
